# Optimized 25M config for RTX 3090 (24GB VRAM)
# Maxes out VRAM usage (batch size 192) for ~26% faster training throughput.

[model]
block_size = 256
n_layer = 8
n_head = 8
n_embd = 512
dropout = 0.0

[ratchet]
pressure_threshold = 8
bucket_low = 0.5
bucket_high = 1.5

[training]
batch_size = 1536
steps = 30000
eval_interval = 250
eval_batches = 20
support_learning_rate = 0.0075
seeds = [1337]
device = "auto"
tokenizer = "subword"
vocab_size = 8000
gradient_checkpointing = true
