# Assistant-scale screen: ~0.96B-weight subword ratchet on enwik8.
# Optimized for RTX 3090: batch_size=224, support_learning_rate=0.005,
# gradient checkpointing, and int8 matmul. Token budget matches the old
# 5k-step batch-192 feasibility screen; not an assistant-quality claim.

[model]
block_size = 256
n_layer = 8
n_head = 24
n_embd = 3072
dropout = 0.0

[ratchet]
pressure_threshold = 8
bucket_low = 0.5
bucket_high = 1.5
compile_update = true

[training]
batch_size = 224
target_tokens = 250_000_000
eval_tokens = 10_000_000
eval_batches = 20
support_learning_rate = 0.005
seeds = [1337]
device = "auto"
tokenizer = "subword"
vocab_size = 8000
matmul_mode = "int8"
gradient_checkpointing = true
