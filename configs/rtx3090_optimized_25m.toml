# Optimized 25M config for RTX 3090 (24GB VRAM)
# True 8K-subword run setting with gradient checkpointing.
# Batch-size probe: 512 passed with headroom; larger batches need fresh validation.
# Current true-subword LR screen favors support_learning_rate=0.020 at this batch.
# Token budget matches the old 30k-step batch-64 recipe.

[model]
block_size = 256
n_layer = 8
n_head = 8
n_embd = 512
dropout = 0.0

[ratchet]
pressure_threshold = 8
bucket_low = 0.5
bucket_high = 1.5
compile_update = true

[training]
batch_size = 512
target_tokens = 500_000_000
eval_tokens = 10_000_000
eval_batches = 20
support_learning_rate = 0.020
seeds = [1337]
device = "auto"
tokenizer = "subword"
vocab_size = 8000
matmul_mode = "int8"
gradient_checkpointing = true
