# Nonary (9-state) arm, ~99M params. Packed footprint ~89MB (code 3.17b + 4b pressure),
# matched to FP32-8M. The MB-for-MB thesis: this ~12x-bigger ratchet should beat FP32-8M
# at equal memory despite lower quality-per-parameter.
[model]
block_size = 256
n_layer = 14
n_head = 12
n_embd = 768
dropout = 0.0
[ratchet]
pressure_threshold = 8
bucket_low = 0.5
bucket_high = 1.5
[training]
batch_size = 64
steps = 20000
eval_interval = 200
eval_batches = 40
support_learning_rate = 0.0003
seeds = [1337]
device = "auto"
